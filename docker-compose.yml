version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sportsmate-backend
    ports:
      - "5000:5000"
    volumes:
      # 호스트의 instance 폴더를 마운트하여 SQLite DB 데이터 영구 보존
      - ./backend/instance:/app/instance
    environment:
      - FLASK_RUN_PORT=5000
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sportsmate-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
