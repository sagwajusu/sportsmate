<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sportsmate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: { 50: "#eef2ff", 100: "#e0e7ff", 500: "#4f46e5", 600: "#4338ca", 700: "#3730a3", 900: "#312e81" },
              skyline: "#0ea5e9"
            },
            boxShadow: { soft: "0 20px 55px rgba(79, 70, 229, 0.12)" }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body class="bg-slate-50 text-slate-950 antialiased">
    <div id="loader" class="fixed inset-0 z-50 grid place-items-center overflow-hidden bg-brand-900 text-white">
      <div class="loader-grid"></div>
      <div class="speed-line speed-line-a"></div>
      <div class="speed-line speed-line-b"></div>
      <div class="speed-line speed-line-c"></div>
      <section class="relative z-10 flex w-full max-w-xl flex-col items-center px-6 text-center">
        <div class="apple-stage mb-8" aria-hidden="true">
          <div class="juice-splash juice-splash-a"></div>
          <div class="juice-splash juice-splash-b"></div>
          <div class="apple-shadow"></div>
          <div class="apple-mark">
            <img class="apple-illustration" src="/img/test3.png" alt="Sportsmate 사과 로고" />
          </div>
          <div class="juice-ripples"><span></span><span></span><span></span></div>
        </div>
        <p class="mb-3 text-sm font-semibold uppercase tracking-[0.28em] text-blue-100">4과주스 · Sportsmate</p>
        <h1 class="text-3xl font-black leading-tight sm:text-4xl">상큼하게 운동할<br />운동 메이트 매칭중</h1>
        <div class="mt-8 h-2 w-full max-w-sm overflow-hidden rounded-full bg-white/15"><div class="loading-bar h-full rounded-full bg-white"></div></div>
        <p class="mt-4 text-sm font-medium text-blue-100">지역, 종목, 시간대를 준비하고 있어요</p>
      </section>
    </div>

    <main id="app" class="min-h-screen opacity-0">
      <aside class="fixed inset-y-0 left-0 z-30 hidden w-60 flex-col bg-brand-900 px-5 py-6 text-white lg:flex">
        <a class="mb-9 flex items-center gap-3 font-black" href="#home"><span class="brand-logo-box"><img src="/img/test3.png" alt="Sportsmate 로고" /></span>SPORTSMATE</a>
        <nav id="side-nav" class="space-y-2 text-sm font-semibold"></nav>
        <a href="#board" class="mt-auto flex items-center justify-center gap-2 rounded bg-skyline px-4 py-3 text-sm font-black text-white"><i data-lucide="plus" class="h-5 w-5"></i>모임 만들기</a>
      </aside>

      <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur lg:hidden">
        <div class="flex h-16 items-center justify-between px-5">
          <a href="#home" class="font-black text-brand-700">SPORTSMATE</a>
          <a href="#board" class="grid h-10 w-10 place-items-center rounded bg-brand-700 text-white"><i data-lucide="plus" class="h-5 w-5"></i></a>
        </div>
      </header>

      <section class="pb-20 lg:pl-60 lg:pb-0">
        <div id="view" class="mx-auto max-w-7xl px-5 py-6 sm:px-8 lg:py-10"></div>
      </section>

      <nav id="mobile-nav" class="fixed inset-x-0 bottom-0 z-20 grid h-16 grid-cols-6 border-t border-slate-200 bg-white text-xs font-bold text-slate-500 lg:hidden"></nav>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
      const meetings = [
        { id: 0, title: "한강 러닝 같이 하실 분!", sport: "러닝", place: "여의도 한강공원", time: "05.25(월) 19:00", member: "12/20", rating: "4.8", state: "host", host: "김강한", desc: "가볍게 5km 뛰고 스트레칭까지 같이 해요. 초보자도 환영합니다.", tags: ["한강러닝", "초보환영", "저녁러닝"], img: "https://images.unsplash.com/photo-1552674605-db6ffd4facb5?auto=format&fit=crop&w=500&q=80" },
        { id: 1, title: "초보자 농구 모임", sport: "농구", place: "잠실 실내체육관", time: "05.26(화) 18:00", member: "8/12", rating: "4.7", state: "joined", host: "박준호", desc: "기초 드리블부터 가볍게 게임까지 진행하는 초보자 중심 농구 모임입니다.", tags: ["초보농구", "실내체육관", "퇴근후"], img: "https://images.unsplash.com/photo-1546519638-68e109498ffc?auto=format&fit=crop&w=500&q=80" },
        { id: 2, title: "관악산 등산 가실 분", sport: "등산", place: "관악산 입구", time: "05.26(화) 08:00", member: "8/15", rating: "4.7", state: "joined", host: "이서연", desc: "관악산 초입부터 천천히 올라가는 주말 등산 모임입니다. 간단한 간식만 챙겨오세요.", tags: ["관악산", "아침등산", "천천히"], img: "https://images.unsplash.com/photo-1551632811-561732d1e306?auto=format&fit=crop&w=500&q=80" },
        { id: 3, title: "자전거 라이딩 모임", sport: "자전거", place: "한강 자전거 도로", time: "05.27(수) 07:00", member: "5/10", rating: "4.7", state: "joined", host: "최도윤", desc: "한강 자전거 도로를 따라 왕복 15km 정도 가볍게 달리는 라이딩입니다.", tags: ["자전거", "한강", "아침라이딩"], img: "https://images.unsplash.com/photo-1507035895480-2b3156c31fc8?auto=format&fit=crop&w=500&q=80" },
        { id: 4, title: "주말 풋살 구해요!", sport: "축구", place: "잠실 풋살장", time: "05.30(토) 20:00", member: "10/14", rating: "4.9", state: "open", host: "윤태오", desc: "주말 저녁 가볍게 풋살하실 분들을 모집합니다. 포지션 상관없이 신청해주세요.", tags: ["풋살", "주말", "친선경기"], img: "https://images.unsplash.com/photo-1431324155629-1a6deb1dec8d?auto=format&fit=crop&w=500&q=80" },
        { id: 5, title: "퇴근 후 배드민턴", sport: "배드민턴", place: "마포 생활체육관", time: "05.29(금) 19:30", member: "6/12", rating: "4.6", state: "open", host: "정하늘", desc: "퇴근 후 2시간 정도 복식 위주로 배드민턴을 칩니다. 라켓 대여 가능합니다.", tags: ["배드민턴", "퇴근후", "복식"], img: "https://images.unsplash.com/photo-1626224583764-f87db24ac4ea?auto=format&fit=crop&w=500&q=80" }
      ];

      const navItems = [
        ["home", "home", "홈"], ["board", "list", "게시판"], ["map", "map", "지도 검색"], ["chat", "message-circle", "내 톡"], ["mymeetings", "calendar-days", "내 일정"], ["profile", "user", "내 정보"]
      ];

      const view = document.getElementById("view");
      const joinedStates = new Set(["host", "joined"]);
      const sportGroups = [
        { group: "구기 종목", purpose: "팀 모집 / 친선전", items: ["축구", "풋살", "농구", "배구", "야구", "족구"] },
        { group: "라켓 스포츠", purpose: "파트너 모집 / 친선전", items: ["배드민턴", "탁구", "테니스", "스쿼시"] },
        { group: "러닝 / 야외", purpose: "동행 모집 / 팀 모집", items: ["러닝", "등산", "트래킹", "자전거", "산책"] },
        { group: "피트니스", purpose: "파트너 모집 / 운동 메이트 모집", items: ["헬스", "크로스핏", "클라이밍", "요가", "필라테스"] },
        { group: "기타", purpose: "파트너 모집", items: ["볼링", "당구", "골프", "수영"] }
      ];
      const allSports = sportGroups.flatMap((group) => group.items);
      const regionGroups = [
        { group: "서울특별시", items: ["여의도", "잠실", "마포", "강남", "홍대", "성수", "관악"] },
        { group: "경기도", items: ["수원", "성남", "고양", "용인", "부천", "안양", "하남"] },
        { group: "인천광역시", items: ["송도", "부평", "청라", "계양", "남동"] },
        { group: "부산광역시", items: ["해운대", "서면", "광안리", "동래"] }
      ];
      const allRegions = regionGroups.flatMap((group) => group.items);

      function routeParams() {
        const raw = (location.hash || "#home").replace("#", "");
        const [name, query = ""] = raw.split("?");
        return { name, params: new URLSearchParams(query) };
      }

      function filteredMeetings(prefix = "board") {
        const { params } = routeParams();
        const sport = params.get("sport") || "";
        const sports = (params.get("sports") || "").split(",").filter(Boolean);
        const group = params.get("group") || "";
        const status = params.get("status") || "";
        const region = params.get("region") || "";
        const regions = (params.get("regions") || "").split(",").filter(Boolean);
        const regionGroup = params.get("regionGroup") || "";
        const query = (params.get("q") || "").trim().toLowerCase();
        const place = (params.get("place") || "").trim().toLowerCase();
        return meetings.filter((item) => {
          const haystack = `${item.title} ${item.sport} ${item.place} ${item.host} ${item.desc} ${item.tags.join(" ")}`.toLowerCase();
          const statusOk = !status || (status === "joined" ? joinedStates.has(item.state) : item.state === status);
          const groupOk = !group || sportsByGroup(group).includes(item.sport) || item.tags.some((tag) => sportsByGroup(group).includes(tag));
          const regionItems = regionGroup ? regionsByGroup(regionGroup) : allRegions;
          const regionOk = regions.length ? regions.some((name) => item.place.includes(name)) : (!region && !regionGroup ? true : region ? item.place.includes(region) : regionItems.some((name) => item.place.includes(name)));
          const sportOk = sports.length ? sports.some((name) => item.sport === name || item.tags.includes(name)) : (!sport || item.sport === sport || item.tags.includes(sport));
          return groupOk && regionOk && sportOk && statusOk && (!query || haystack.includes(query)) && (!place || item.place.toLowerCase().includes(place));
        });
      }

      function setRouteParam(routeName, key, value) {
        const params = routeParams().params;
        if (value) params.set(key, value); else params.delete(key);
        location.hash = `#${routeName}${params.toString() ? `?${params.toString()}` : ""}`;
      }

      window.setBoardParam = (key, value) => setRouteParam("board", key, value);
      window.setMapParam = (key, value) => setRouteParam("map", key, value);
      window.applyBoardSearch = () => setBoardParam("q", document.getElementById("board-search")?.value || "");
      window.applyMapSearch = () => setMapParam("q", document.getElementById("map-search")?.value || "");
      window.applyMapPlace = () => setMapParam("place", document.getElementById("map-place")?.value || "");

      function sportOptions(selected = "") {
        return `<option value="">전체 종목</option>${allSports.map((sport) => `<option value="${sport}" ${selected === sport ? "selected" : ""}>${sport}</option>`).join("")}`;
      }
      function sportGroupOptions(selected = "") {
        return `<option value="">전체 대분류</option>${sportGroups.map((group) => `<option value="${group.group}" ${selected === group.group ? "selected" : ""}>${group.group}</option>`).join("")}`;
      }

      function sportsByGroup(groupName) {
        const group = sportGroups.find((item) => item.group === groupName);
        return group ? group.items : allSports;
      }

      function sportGroupFor(sportName) {
        return sportGroups.find((group) => group.items.includes(sportName))?.group || "";
      }

      function sportSubOptions(groupName = "", selected = "") {
        const items = sportsByGroup(groupName);
        return `<option value="">전체 소분류</option>${items.map((sport) => `<option value="${sport}" ${selected === sport ? "selected" : ""}>${sport}</option>`).join("")}`;
      }

      function setBoardGroup(value) {
        const params = routeParams().params;
        if (value) params.set("group", value); else params.delete("group");
        params.delete("sport");
        location.hash = `#board${params.toString() ? `?${params.toString()}` : ""}`;
      }
      function regionGroupOptions(selected = "") {
        return `<option value="">전체 지역</option>${regionGroups.map((group) => `<option value="${group.group}" ${selected === group.group ? "selected" : ""}>${group.group}</option>`).join("")}`;
      }

      function regionsByGroup(groupName) {
        const group = regionGroups.find((item) => item.group === groupName);
        return group ? group.items : allRegions;
      }

      function regionGroupFor(regionName) {
        return regionGroups.find((group) => group.items.includes(regionName))?.group || "";
      }

      function regionSubOptions(groupName = "", selected = "") {
        const items = regionsByGroup(groupName);
        return `<option value="">전체 시/구</option>${items.map((region) => `<option value="${region}" ${selected === region ? "selected" : ""}>${region}</option>`).join("")}`;
      }

      function setBoardRegionGroup(value) {
        const params = routeParams().params;
        if (value) params.set("regionGroup", value); else params.delete("regionGroup");
        params.delete("region");
        location.hash = `#board${params.toString() ? `?${params.toString()}` : ""}`;
      }

      function currentHomeSearchHash() {
        const sports = [...document.querySelectorAll('[name="home-sport"]:checked')].map((item) => item.value);
        const regions = [...document.querySelectorAll('[name="home-region"]:checked')].map((item) => item.value);
        const params = new URLSearchParams();
        if (sports.length) params.set("sports", sports.join(","));
        if (regions.length) params.set("regions", regions.join(","));
        return `#board${params.toString() ? `?${params.toString()}` : ""}`;
      }

      function updateHomeSearchButton() {
        const button = document.getElementById("home-match-button");
        if (!button) return;
        const selectedSports = [...document.querySelectorAll('[name="home-sport"]:checked')].map((item) => item.value);
        const selectedRegions = [...document.querySelectorAll('[name="home-region"]:checked')].map((item) => item.value);
        const hasValue = selectedSports.length > 0 || selectedRegions.length > 0;
        button.textContent = hasValue ? "매칭하기" : "전체검색";
        button.href = currentHomeSearchHash();
        renderSelectedSummary("sport", selectedSports);
        renderSelectedSummary("region", selectedRegions);
      }


      function renderSelectedSummary(type, values) {
        const target = document.querySelector(`[data-selected-summary="${type}"]`);
        if (!target) return;
        target.innerHTML = values.length ? values.map((value) => `<span>${value}</span>`).join("") : `<em>선택 없음</em>`;
      }      window.toggleHomeChoice = function toggleHomeChoice(name, value) {
        const current = document.querySelector(`[name="${name}"][value="${value}"]`);
        if (current?.checked) current.checked = false;
        else if (current) current.checked = true;
        updateHomeSearchButton();
      };
      window.selectHomeRegionGroup = function selectHomeRegionGroup(groupName) {
        document.querySelectorAll(".home-region-tab").forEach((button) => button.classList.toggle("is-active", button.dataset.regionGroup === groupName));
        document.querySelectorAll(".home-region-panel").forEach((panel) => panel.classList.toggle("is-active", panel.dataset.regionGroup === groupName));
      };

      window.toggleHomeSection = function toggleHomeSection(button) {
        const section = button.closest(".home-choice-group");
        section?.classList.toggle("is-collapsed");
        button.setAttribute("aria-expanded", String(!section?.classList.contains("is-collapsed")));
      };

      function boardRows(items) {
        return items.length ? items.map((m) => `<a href="${detailHash(m)}" class="board-row board-row-state"><span><img src="${m.img}" alt=""><b>${m.title}</b><small>${m.place}</small></span><span>${stateBadge(m)}</span><span>${m.sport}</span><span>${m.place}</span><span>${m.time}</span><span>${m.member}</span><strong>★ ${m.rating}</strong></a>`).join("") : `<div class="empty-result"><i data-lucide="search-x"></i><b>조건에 맞는 모임이 없습니다.</b><span>검색어와 필터를 조금 넓혀보세요.</span></div>`;
      }

      function memberCount(item) {
        return `${item.member.split("/")[0]}명`;
      }

      function detailHash(item) {
        return `#detail-${item.id}`;
      }

      function getMeetingFromRoute(route) {
        const id = Number(route.split("-")[1] || 0);
        return meetings.find((item) => item.id === id) || meetings[0];
      }

      function stateBadge(item) {
        if (item.state === "host") return `<span class="board-badge host"><i data-lucide="crown"></i>내가 방장</span>`;
        if (item.state === "joined") return `<span class="board-badge joined">참여중</span>`;
        return `<span class="board-badge open">모집중</span>`;
      }

      function meetingCard(item) {
        return `<a href="${detailHash(item)}" class="meeting-card"><img src="${item.img}" alt="${item.title}" /><span class="tag">${item.sport}</span><b>${item.title}</b><small>${item.place}<br>${item.time}</small><footer><span>${item.member}</span><strong>★ ${item.rating}</strong></footer></a>`;
      }

      function pageTitle(title, desc) {
        return `<div class="screen-title"><div><p>Sportsmate Flow</p><h1>${title}</h1><span>${desc}</span></div><a href="#home" class="ghost-btn"><i data-lucide="home"></i>홈으로</a></div>`;
      }

      function detailPage(item) {
        const isJoined = joinedStates.has(item.state);
        const isHost = item.state === "host";
        return `${pageTitle(`${item.title} ${stateBadge(item)}`, "상세에서 참여 상태를 확인하고 다음 행동으로 이어집니다.")}<div class="detail-grid"><section class="page-card"><div class="host-line"><img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=120&q=80" alt=""><div><b>${item.host}</b><small>★ ${item.rating} · ${item.sport} 모임장</small></div></div><img class="detail-cover" src="${item.img}" alt="${item.title}"><div class="detail-tabs"><button class="tab-on">소개</button><button>오픈 채팅</button><button>참가자</button><button>후기</button></div><p class="detail-copy">${item.desc}</p><div class="chip-wrap">${item.tags.map((tag) => `<span>#${tag}</span>`).join("")}</div></section><aside class="page-card side-info"><h2>모임 정보</h2><p><i data-lucide="map-pin"></i>${item.place}</p><p><i data-lucide="clock"></i>${item.time}</p><p><i data-lucide="users"></i>${item.member}명</p><p><i data-lucide="gauge"></i>난이도 초급</p><a class="primary-btn" href="${isJoined ? `#chat-${item.id}` : '#mymeetings'}">${isJoined ? '채팅방으로 이동' : '참가 신청'}</a>${isHost ? '<a class="primary-btn host-only" href="#host"><i data-lucide="layout-dashboard"></i>방장 대시보드</a>' : ''}<a class="ghost-btn full" href="#map">지도에서 보기</a></aside></div>`;
      }

      function meetingDay(item) {
        const match = item.time.match(/05\.(\d{2})/);
        return match ? Number(match[1]) : null;
      }

      function meetingsOnDay(day) {
        return meetings.filter((item) => meetingDay(item) === day);
      }

      window.showScheduleDay = function showScheduleDay(day) {
        const modal = document.getElementById("schedule-modal");
        if (!modal) return;
        const items = meetingsOnDay(Number(day));
        const body = modal.querySelector(".schedule-modal-body");
        const title = modal.querySelector(".schedule-modal-title");
        title.textContent = `5월 ${day}일 일정`;
        body.innerHTML = items.length ? items.map((m) => `<article class="schedule-modal-item"><img src="${m.img}" alt="${m.title}"><div><span>${m.time}</span><h3>${m.title}</h3><p>${m.place} · ${m.member}</p>${stateBadge(m)}<footer><a class="ghost-btn" href="${detailHash(m)}">상세 보기</a>${joinedStates.has(m.state) ? `<a class="ghost-btn" href="#chat-${m.id}">톡방</a>` : '<a class="primary-small" href="#mymeetings">참가 신청</a>'}${m.state === 'host' ? '<a class="primary-small" href="#host">관리</a>' : ''}</footer></div></article>`).join("") : `<p class="empty-schedule">등록된 일정이 없습니다.</p>`;
        modal.classList.add("is-open");
        if (window.lucide) window.lucide.createIcons();
      };

      window.closeScheduleModal = function closeScheduleModal() {
        document.getElementById("schedule-modal")?.classList.remove("is-open");
      };
      const pages = {
        home: () => `
          <section class="home-shell page-card">

 ''}>모집중</option></select><select><option>최신순</option><option>평점 높은순</option><option>참여 많은순</option></select></div></div><div class="page-card"><div class="section-head"><h2>검색 결과</h2><span>${items.length}개</span></div><div class="board-table"><div class="board-head"><span>모임 정보</span><span>상태</span><span>종목</span><span>지역</span><span>일시</span><span>참여</span><span>평점</span></div>${boardRows(items)}</div></div>`; };
      pages.map = () => { const { params } = routeParams(); const items = filteredMeetings("map"); const selectedSport = params.get("sport") || ""; const q = params.get("q") || ""; const place = params.get("place") || ""; return `${pageTitle("지도 검색", "현재 위치 또는 지정한 위치 주변의 모임을 검색합니다.")}<div class="page-card map-control-card"><div class="location-mode"><button class="tab-on"><i data-lucide="crosshair"></i>현재 위치 기준</button><label><i data-lucide="map-pin"></i><input id="map-place" value="${place}" placeholder="원하는 위치 입력 예: 잠실, 마포" onkeydown="if(event.key === 'Enter') applyMapPlace()"></label><button type="button" onclick="applyMapPlace()">위치 적용</button></div><div class="board-search-row map-search-row"><label><i data-lucide="search"></i><input id="map-search" value="${q}" placeholder="장소, 종목, 모임명 검색" onkeydown="if(event.key === 'Enter') applyMapSearch()"></label><select onchange="setMapParam('sport', this.value)">${sportOptions(selectedSport)}</select><button type="button" onclick="applyMapSearch()">검색</button></div></div><div class="map-layout"><section class="mock-map page-card"><div class="map-current-label"><i data-lucide="navigation"></i>${place || '내 현재 위치'} 기준</div><div class="map-pin p1"><i data-lucide="footprints"></i></div><div class="map-pin p2"><i data-lucide="bike"></i></div><div class="map-pin p3"><i data-lucide="mountain"></i></div><div class="map-center"></div></section><aside class="page-card"><div class="section-head"><h2>검색 결과</h2><span>${items.length}개</span></div>${items.length ? items.map((m)=>`<a href="${detailHash(m)}" class="map-result"><img src="${m.img}" alt=""><span><b>${m.title}</b><small>${m.place} · ${m.sport} · ${m.member}</small></span></a>`).join("") : `<div class="empty-result compact"><i data-lucide="map-x"></i><b>주변 모임이 없습니다.</b></div>`}</aside></div>`; };

      pages.profile = () => `${pageTitle("내 정보", "프로필을 수정하고 운동 성향과 활동 기록을 관리합니다.")}<div class="profile-gold-shell"><section class="profile-card profile-gold-card"><button class="profile-edit-btn"><i data-lucide="pencil"></i>프로필 수정</button><img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=200&q=80" alt=""><h2>김강한</h2><p>러닝 · 농구 · 등산을 좋아해요</p><div><b>4.8</b><span>평점</span><b>92%</b><span>참여율</span><b>12회</b><span>참여 모임</span></div></section><section class="page-card profile-edit-card"><div class="section-head"><h2>프로필 편집</h2><span>인디고 + 골드 테마</span></div><div class="profile-form"><label>닉네임<input value="김강한"></label><label>선호 지역<input value="여의도, 잠실, 관악"></label><label>선호 종목<select><option>러닝</option><option>농구</option><option>등산</option><option>배드민턴</option></select></label><label>자기소개<textarea>퇴근 후 가볍게 운동하는 모임을 좋아합니다.</textarea></label></div><div class="profile-chip-list"><span>평일 저녁</span><span>초보 환영</span><span>한강 러닝</span><span>친선 경기</span></div><button class="gold-action" type="button"><i data-lucide="save"></i>수정 내용 저장</button></section><section class="page-card profile-preference-card"><h2>운동 성향</h2><div class="preference-list"><p><b>운동 강도</b><span>가볍게 오래</span></p><p><b>모임 목적</b><span>운동 메이트 / 친목</span></p><p><b>응답 속도</b><span>평균 12분</span></p><p><b>관심 종목</b><span>러닝, 농구, 등산, 자전거</span></p></div></section><section class="page-card"><div class="section-head"><h2>내 일정</h2><a href="#mymeetings">전체 보기</a></div><div class="profile-host-panel"><div><span><i data-lucide="crown"></i>내가 방장</span><h3>${meetings[0].title}</h3><p>${meetings[0].place} · ${meetings[0].time} · ${meetings[0].member}</p></div><a class="primary-small" href="#host"><i data-lucide="layout-dashboard"></i>관리</a></div>${meetings.filter((m) => m.state === 'joined').map((m)=>`<a class="meeting-row" href="${detailHash(m)}"><span class="meeting-thumb" style="background-image:url('${m.img}')"></span><span class="min-w-0 flex-1"><b>${m.title}</b><small>${m.time}</small></span><strong>${m.member}</strong></a>`).join("")}</section><section class="page-card stat-card profile-gold-stat"><h2>내 통계</h2><div class="donut">92%</div><p>참여 92% · 불참 8%</p><h3>평점 히스토리</h3><div class="bars"><span style="width:70%"></span><span style="width:20%"></span><span style="width:8%"></span><span style="width:2%"></span></div></section></div>`;
      function appleWatermark() {
        return `<div class="talk-empty-apple"><img src="/img/test3.png" alt="Sportsmate 사과 로고"><p>톡방을 더블클릭하면 대화가 열립니다.</p></div>`;
      }

      function talkEmptyPanel() {
        return `<section class="page-card talk-room talk-room-empty">${appleWatermark()}</section>`;
      }

      function talkRoomPanel(item) {
        return `<section class="page-card talk-room talk-room-open"><div class="talk-room-top"><div><strong class="talk-room-title">${item.title}</strong><small class="talk-room-meta">${item.place} · ${memberCount(item)}</small></div><span>${item.state === 'host' ? '<a class="host-chat-btn" href="#host"><i data-lucide="layout-dashboard"></i>방장 대시보드</a>' : ''}<button class="talk-tool-btn" type="button" data-action="talk-info"><i data-lucide="clipboard-list"></i><b>공지/일정</b></button><button class="talk-icon-btn" type="button" data-action="talk-search"><i data-lucide="search"></i></button><button class="talk-close-btn" type="button" data-action="talk-close"><i data-lucide="x"></i></button></span></div><div class="talk-search-panel"><i data-lucide="search"></i><input placeholder="대화 내용 검색"></div><div class="talk-info-panel"><a href="${detailHash(item)}"><i data-lucide="megaphone"></i><span>공지와 모임 상세 확인</span></a><a href="#mymeetings"><i data-lucide="calendar-days"></i><span>${item.time} 일정 보기</span></a><a href="#votes"><i data-lucide="bar-chart-3"></i><span>투표 확인</span></a></div><div class="talk-messages"><div class="talk-date">오늘</div><div class="talk-bubble left"><b>${item.host}</b><p>오늘 모임 시간 맞춰서 오시면 됩니다!</p></div><div class="talk-bubble right"><p>네 확인했습니다. 준비해서 갈게요.</p></div><div class="talk-bubble left"><b>모임 공지</b><p>장소와 준비물은 상세 페이지에서 다시 확인해주세요.</p></div><div class="talk-poll"><b>코스 투표</b><p>어떤 코스로 진행할까요?</p><div><span>5km 코스</span><em style="width:67%"></em><strong>8명</strong></div><div><span>8km 코스</span><em style="width:33%"></em><strong>4명</strong></div></div></div><div class="talk-input"><span>메시지를 입력하세요...</span><i data-lucide="send"></i></div></section>`;
      }
      function previewTalkRoom(id) {
        document.querySelectorAll(".talk-room-item").forEach((el) => el.classList.toggle("selected", Number(el.dataset.chatId) === Number(id)));
      }

      function openTalkRoom(id) {
        location.hash = `#chat-${id}`;
      }

      function closeTalkRoom() {
        history.replaceState(null, "", "#chat");
        const talkRoom = document.querySelector(".talk-room");
        document.querySelectorAll(".talk-room-item").forEach((el) => el.classList.remove("selected"));
        if (!talkRoom) return;
        talkRoom.classList.add("talk-room-closing");
        talkRoom.style.transition = "opacity 420ms cubic-bezier(0.55, 0, 1, 0.45), transform 420ms cubic-bezier(0.55, 0, 1, 0.45)";
        talkRoom.style.willChange = "opacity, transform";
        window.requestAnimationFrame(() => {
          talkRoom.style.opacity = "0";
          talkRoom.style.transform = "translateX(36px)";
        });
        window.setTimeout(() => {
          talkRoom.outerHTML = talkEmptyPanel();
          if (window.lucide) window.lucide.createIcons();
        }, 430);
      }

      function toggleTalkSearch() {
        document.querySelector(".talk-search-panel")?.classList.toggle("is-open");
        document.querySelector(".talk-search-panel input")?.focus();
      }

      function toggleTalkInfo() {
        document.querySelector(".talk-info-panel")?.classList.toggle("is-open");
      }
      function renderNav() {
        document.getElementById("side-nav").innerHTML = navItems.map(([id, icon, label]) => `<a class="nav-link flex items-center gap-3 rounded px-4 py-3" data-route="${id}" href="#${id}"><i data-lucide="${icon}" class="h-5 w-5"></i>${label}</a>`).join("");
        document.getElementById("mobile-nav").innerHTML = navItems.map(([id, icon, label]) => `<a data-route="${id}" href="#${id}"><i data-lucide="${icon}" class="h-5 w-5"></i><span>${label.replace(' 검색','')}</span></a>`).join("");
      }

      function render() {
        const rawRoute = (location.hash || "#home").replace("#", "");
        const route = rawRoute.split("?")[0];
        const activeRoute = route.startsWith("detail-") ? "board" : route.startsWith("chat-") ? "chat" : route;
        view.innerHTML = route.startsWith("detail-") ? detailPage(getMeetingFromRoute(route)) : route.startsWith("chat-") ? pages.chat(route.split("-")[1]) : (pages[route] || pages.home)();
        document.querySelectorAll("[data-route]").forEach((el) => el.classList.toggle(el.closest("#mobile-nav") ? "mobile-active" : "nav-active", el.dataset.route === activeRoute));
        if (window.lucide) window.lucide.createIcons();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
      window.addEventListener("load", () => {
        renderNav();
        render();
        window.addEventListener("hashchange", render);
        document.addEventListener("click", (event) => {
          const actionButton = event.target.closest("[data-action]");
          if (!actionButton) return;
          const action = actionButton.dataset.action;
          if (action === "talk-close") closeTalkRoom();
          if (action === "talk-search") toggleTalkSearch();
          if (action === "talk-info") toggleTalkInfo();
        });
        if (window.lucide) window.lucide.createIcons();
        window.setTimeout(() => {
          document.getElementById("loader").classList.add("loader-out");
          document.getElementById("app").classList.add("app-ready");
        }, 3000);
      });
    </script>
  </body>
</html>
