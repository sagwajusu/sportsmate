<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SportsMate Legacy Server</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, "Noto Sans KR", sans-serif;
        color: #0f172a;
        background: #f8fafc;
      }

      main {
        width: min(92vw, 520px);
        padding: 32px;
        border: 1px solid #dbe3ef;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        margin: 0 0 20px;
        line-height: 1.6;
        color: #475569;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 8px;
        color: #fff;
        background: #4f46e5;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SportsMate 개발 서버로 이동하세요</h1>
      <p>
        이 주소는 예전 정적 프로토타입 서버입니다. 현재 모임 게시판과 상세 페이지는
        Flask API와 Vite 개발 서버를 통해 DB 데이터를 불러옵니다.
      </p>
      <a href="http://localhost:5173/meetings">모임 게시판 열기</a>
    </main>
  </body>
</html>
